name: Recommend Movie

on:
  schedule:
    # Run every Monday at 01:00 UTC (09:00 Beijing)
    - cron: "0 1 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  recommend:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for git push

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run manus-cine
        env:
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          GITHUB_ACTIONS: "true"
        run: uv run python -m manus_cine

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trailers/ recommended/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            git commit -m "feat: add movie trailer and recommendation"
            git push
          fi
